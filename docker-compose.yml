services:
  kenichi-explicit:
    image: ghcr.io/cytsai1008/kenichi-profile-ext-server:latest
    env_file:
      - .env
    environment:
      - GALLERY_DATA_DIR=/data
    volumes:
      - /srv/kenichi-explicit/data:/data
    restart: unless-stopped
    depends_on:
      - cloudflared

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    # Tunnel config (Cloudflare dashboard) should route:
    #   kenichi-explicit.photocat.blue      -> http://kenichi-explicit:8080
    #   sync.kenichi-explicit.photocat.blue -> http://kenichi-explicit:8081
